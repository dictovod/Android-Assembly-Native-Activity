name: Build ASM Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;29.0.13113456" "cmake;4.0.2"

      - name: Set NDK path
        run: |
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/29.0.13113456" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          cat local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --console=plain

      - name: Find APK
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK found: $APK"
          ls -lh $APK

      - name: Analyze binary sections
        run: |
          APK=${{ env.APK_PATH }}
          echo "=== APK SIZE ==="
          du -sh $APK

          # Извлечь .so
          unzip -p $APK $(unzip -l $APK | grep "lib/arm64-v8a" | grep ".so" | awk '{print $4}' | head -1) > /tmp/lib.so 2>/dev/null || true

          if [ -s /tmp/lib.so ]; then
            echo "=== BINARY SECTIONS ==="
            size /tmp/lib.so || true
            echo "=== READELF SECTIONS ==="
            readelf -S /tmp/lib.so | grep -E "\.(text|data|rodata|bss)" || true
          fi

          echo "=== SOURCE LINES ==="
          echo "Assembly: $(find . -name '*.s' -o -name '*.S' | xargs wc -l 2>/dev/null | tail -1)"
          echo "C/C++:    $(find . -name '*.c' -o -name '*.cpp' | xargs wc -l 2>/dev/null | tail -1)"
          echo "Build:    $(find . -name 'CMakeLists.txt' -o -name '*.gradle*' | xargs wc -l 2>/dev/null | tail -1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-asm
          path: ${{ env.APK_PATH }}
          retention-days: 7
